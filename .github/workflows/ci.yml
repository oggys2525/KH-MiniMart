name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MiniMartPOS.sln

      - name: Build
        run: dotnet build MiniMartPOS.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MiniMartPOS.sln --configuration Release --no-build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ClientApp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ClientApp/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
